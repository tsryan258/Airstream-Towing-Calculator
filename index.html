<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Airstream Tow Calculator</title>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: Georgia, serif;
      background: linear-gradient(135deg, #1a1208 0%, #1c1810 50%, #0e0e0e 100%);
      min-height: 100vh;
      color: #e8e0d0;
    }
    .container { max-width: 600px; margin: 0 auto; padding: 2rem 1rem; }
    .header { text-align: center; margin-bottom: 1.5rem; }
    .header .icon { font-size: 3rem; margin-bottom: 0.25rem; }
    .header h1 { font-size: 1.6rem; font-weight: bold; color: #f0c040; letter-spacing: 0.05em; text-shadow: 0 2px 20px rgba(240,192,64,0.3); }
    .header p { color: #9ca3af; font-size: 0.85rem; margin-top: 0.25rem; }
    .progress-wrap { margin-bottom: 1.5rem; }
    .progress-labels { display: flex; justify-content: space-between; font-size: 0.75rem; color: #6b7280; margin-bottom: 0.25rem; }
    .progress-bar { height: 6px; background: #374151; border-radius: 9999px; overflow: hidden; }
    .progress-fill { height: 100%; background: #facc15; border-radius: 9999px; transition: width 0.4s ease; }
    .card { background: rgba(255,255,255,0.05); border: 1px solid rgba(255,255,255,0.1); border-radius: 16px; padding: 2rem; }
    .step-icon { font-size: 2.5rem; margin-bottom: 0.5rem; }
    h2 { color: #fcd34d; font-size: 1.2rem; font-weight: bold; margin-bottom: 0.5rem; }
    .hint { color: #9ca3af; font-size: 0.875rem; margin-top: 0.5rem; line-height: 1.6; }
    .hint em { color: #d1d5db; }
    label { display: block; color: #fcd34d; font-size: 0.75rem; font-weight: bold; margin-bottom: 0.5rem; text-transform: uppercase; letter-spacing: 0.1em; margin-top: 1.25rem; }
    input, select {
      width: 100%; background: #1f2937; border: 1px solid #4b5563;
      border-radius: 10px; padding: 0.75rem 1rem; color: white; font-size: 1rem;
      outline: none; transition: border-color 0.2s; font-family: Georgia, serif;
    }
    input:focus, select:focus { border-color: #facc15; }
    select option { background: #1f2937; }
    .warn { color: #f59e0b; font-size: 0.75rem; margin-top: 0.5rem; }
    .info-box { background: rgba(0,0,0,0.3); border-radius: 10px; padding: 0.875rem; margin-top: 0.75rem; font-size: 0.8rem; color: #d1d5db; line-height: 1.8; }
    .info-box .title { color: #fcd34d; font-weight: bold; }
    .pct-btns { display: flex; gap: 0.5rem; margin-top: 0.75rem; }
    .pct-btn { flex: 1; background: #374151; color: #e5e7eb; padding: 0.5rem 0; border-radius: 8px; border: none; font-size: 0.8rem; cursor: pointer; transition: background 0.15s; font-family: Georgia, serif; }
    .pct-btn:hover { background: #4b5563; }
    .nav { display: flex; justify-content: space-between; margin-top: 2rem; }
    .btn-primary { background: #facc15; color: #1c1917; font-weight: bold; padding: 0.75rem 1.75rem; border-radius: 10px; border: none; font-size: 0.95rem; cursor: pointer; transition: background 0.15s; font-family: Georgia, serif; }
    .btn-primary:hover { background: #fde047; }
    .btn-primary:disabled { background: #78716c; color: #a8a29e; cursor: not-allowed; }
    .btn-secondary { background: #374151; color: #e5e7eb; font-weight: 600; padding: 0.75rem 1.5rem; border-radius: 10px; border: none; font-size: 0.95rem; cursor: pointer; transition: background 0.15s; font-family: Georgia, serif; }
    .btn-secondary:hover { background: #4b5563; }
    .welcome-center { text-align: center; }
    .welcome-center h2 { font-size: 1.4rem; margin-bottom: 1rem; }
    .welcome-center p { color: #d1d5db; line-height: 1.7; margin-bottom: 1.5rem; }
    .verdict-box { text-align: center; margin-bottom: 1.5rem; }
    .verdict-inner { display: inline-block; padding: 1rem 2rem; border-radius: 12px; }
    .verdict-emoji { font-size: 2.5rem; margin-bottom: 0.25rem; }
    .verdict-text { font-size: 1.1rem; font-weight: bold; }
    .checks { display: flex; flex-direction: column; gap: 0.75rem; }
    .check-item { background: rgba(255,255,255,0.04); border-radius: 10px; padding: 0.875rem 1rem; }
    .check-header { display: flex; align-items: center; gap: 0.5rem; margin-bottom: 0.25rem; }
    .check-label { font-weight: bold; color: #fde68a; font-size: 0.875rem; }
    .check-skip { font-size: 0.75rem; color: #6b7280; }
    .check-desc { color: #d1d5db; font-size: 0.85rem; margin-bottom: 0.5rem; }
    .bar-wrap { height: 6px; background: #374151; border-radius: 9999px; overflow: hidden; }
    .bar-fill { height: 100%; border-radius: 9999px; }
    .bar-label { font-size: 0.75rem; margin-top: 0.25rem; }
    .travel-note { margin-top: 1rem; background: rgba(146,64,14,0.3); border: 1px solid rgba(217,119,6,0.4); border-radius: 12px; padding: 0.875rem; font-size: 0.875rem; color: #fde68a; }
    .result-actions { margin-top: 1.5rem; display: flex; gap: 0.75rem; flex-wrap: wrap; }
    .footer { text-align: center; color: #4b5563; font-size: 0.75rem; margin-top: 1.5rem; line-height: 1.6; }
    .hidden { display: none; }
    .field-group { display: flex; flex-direction: column; gap: 1rem; margin-top: 0.5rem; }
  </style>
</head>
<body>
<div class="container">
  <div class="header">
    <div class="icon">🏕️</div>
    <h1>Airstream Tow Calculator</h1>
    <p>Know before you go — safety starts with the numbers</p>
  </div>

  <div class="progress-wrap hidden" id="progressWrap">
    <div class="progress-labels">
      <span id="stepLabel">Step 1 of 9</span>
      <span id="pctLabel">0%</span>
    </div>
    <div class="progress-bar"><div class="progress-fill" id="progressFill" style="width:0%"></div></div>
  </div>

  <div class="card" id="card"></div>

  <div class="footer">
    Always verify with your door jamb sticker, owner's manual, and manufacturer towing guide.<br/>
    For informational planning only.
  </div>
</div>

<script>
const airstreams = [
  { name: "Bambi 16RB", gvwr: 3500 },
  { name: "Bambi 19CB", gvwr: 3900 },
  { name: "Caravel 20FB", gvwr: 4300 },
  { name: "Caravel 22FB", gvwr: 4500 },
  { name: "Flying Cloud 23FB", gvwr: 5500 },
  { name: "Flying Cloud 25FB", gvwr: 5900 },
  { name: "Flying Cloud 27FB", gvwr: 6300 },
  { name: "Flying Cloud 30FB", gvwr: 6800 },
  { name: "International 23FB", gvwr: 5500 },
  { name: "International 25FB", gvwr: 5900 },
  { name: "Classic 30RB", gvwr: 8000 },
  { name: "Classic 33FB", gvwr: 8500 },
  { name: "Globetrotter 23FB", gvwr: 5500 },
  { name: "Globetrotter 25FB", gvwr: 5900 },
  { name: "Custom / Enter GVWR", gvwr: null },
];

const steps = [
  "welcome","truck_payload","truck_rear_gawr","truck_gcwr","truck_tongue",
  "trailer_gvwr","trailer_loaded","trailer_tongue","passengers_cargo","hitch_weight","results"
];

let currentStep = 0;
let results = null;
let data = {
  payload:"", rearGawr:"", gcwr:"", truckTongueRating:"",
  trailerGvwr:"", trailerLoaded:"", trailerTongue:"",
  passengers:"", cargo:"", hitchWeight:"", truckWeight:"",
  selectedAirstream:""
};

const n = v => parseFloat(v) || 0;

function computeResults() {
  const payload = n(data.payload), rearGawr = n(data.rearGawr), gcwr = n(data.gcwr);
  const truckTongueRating = n(data.truckTongueRating), trailerLoaded = n(data.trailerLoaded);
  const trailerTongue = n(data.trailerTongue), passengers = n(data.passengers);
  const cargo = n(data.cargo), hitchWeight = n(data.hitchWeight), truckWeight = n(data.truckWeight);

  const payloadUsed = trailerTongue + passengers + cargo + hitchWeight;
  const payloadMargin = payload - payloadUsed;
  const payloadOk = payloadMargin >= 0;
  const payloadPct = payload > 0 ? (payloadUsed / payload) * 100 : 0;

  const rearAxleLoad = trailerTongue + passengers * 0.5 + cargo * 0.4 + hitchWeight;
  const rearGawrOk = rearGawr === 0 || rearAxleLoad <= rearGawr;
  const rearPct = rearGawr > 0 ? (rearAxleLoad / rearGawr) * 100 : 0;

  const combined = truckWeight > 0 ? truckWeight + trailerLoaded : 0;
  const gcwrOk = gcwr === 0 || combined === 0 || combined <= gcwr;
  const gcwrPct = gcwr > 0 && combined > 0 ? (combined / gcwr) * 100 : 0;

  const tongueOk = truckTongueRating === 0 || trailerTongue <= truckTongueRating;
  const tonguePct = truckTongueRating > 0 ? (trailerTongue / truckTongueRating) * 100 : 0;

  const checks = [
    { label:"Payload Check", desc:`Tongue (${trailerTongue} lbs) + Passengers (${passengers} lbs) + Cargo (${cargo} lbs) + Hitch (${hitchWeight} lbs) = ${payloadUsed} lbs vs. ${payload} lbs payload`, ok:payloadOk, pct:payloadPct, margin:payloadMargin, critical:true },
    { label:"Tongue Weight vs. Hitch Rating", desc:`${trailerTongue} lbs tongue vs. ${truckTongueRating} lbs hitch rating`, ok:tongueOk, pct:tonguePct, margin:truckTongueRating-trailerTongue, critical:truckTongueRating>0 },
    { label:"Rear Axle Check", desc:`Est. rear axle load: ~${Math.round(rearAxleLoad)} lbs vs. ${rearGawr} lbs GAWR`, ok:rearGawrOk, pct:rearPct, margin:rearGawr-rearAxleLoad, critical:rearGawr>0 },
    { label:"GCWR Check", desc:combined>0?`Truck (${truckWeight} lbs) + Trailer (${trailerLoaded} lbs) = ${combined} lbs vs. ${gcwr} lbs GCWR`:"Truck curb weight not provided — skipped", ok:gcwrOk, pct:gcwrPct, margin:gcwr-combined, critical:combined>0&&gcwr>0 },
  ];

  const allOk = checks.filter(c => c.critical && !c.ok).length === 0;
  const payloadMarginPct = payload > 0 ? (payloadMargin / payload) * 100 : 100;
  const gcwrMarginPct = gcwr > 0 && combined > 0 ? ((gcwr - combined) / gcwr) * 100 : 100;
  const hasGoodMargin = payloadMarginPct >= 10 && gcwrMarginPct >= 10;
  return { checks, allOk, hasGoodMargin };
}

function canNext() {
  const s = steps[currentStep];
  if (s === "truck_payload") return !!data.payload;
  if (s === "truck_rear_gawr") return !!data.rearGawr;
  if (s === "truck_gcwr") return !!data.gcwr;
  if (s === "truck_tongue") return !!data.truckTongueRating;
  if (s === "trailer_gvwr") return !!data.trailerGvwr;
  if (s === "trailer_loaded") return !!data.trailerLoaded;
  if (s === "trailer_tongue") return !!data.trailerTongue;
  return true;
}

function goNext() {
  if (steps[currentStep] === "trailer_loaded" && !data.trailerTongue) {
    data.trailerTongue = Math.round((n(data.trailerLoaded) || n(data.trailerGvwr)) * 0.13).toString();
  }
  if (steps[currentStep] === "results") return;
  if (steps[currentStep] === "hitch_weight") results = computeResults();
  currentStep = Math.min(currentStep + 1, steps.length - 1);
  render();
}

function goBack() {
  currentStep = Math.max(currentStep - 1, 0);
  render();
}

function resetAll() {
  currentStep = 0;
  results = null;
  data = { payload:"", rearGawr:"", gcwr:"", truckTongueRating:"", trailerGvwr:"", trailerLoaded:"", trailerTongue:"", passengers:"", cargo:"", hitchWeight:"", truckWeight:"", selectedAirstream:"" };
  render();
}

function setPct(pct) {
  data.trailerTongue = Math.round(n(data.trailerLoaded) * (pct / 100)).toString();
  render();
}

function selectAirstream(name) {
  data.selectedAirstream = name;
  const sel = airstreams.find(a => a.name === name);
  if (sel && sel.gvwr) {
    data.trailerGvwr = sel.gvwr.toString();
    data.trailerLoaded = sel.gvwr.toString();
  }
  render();
}

function generatePDF() {
  if (!window.jspdf) { alert("PDF library still loading, please try again."); return; }
  const { jsPDF } = window.jspdf;
  const doc = new jsPDF({ unit: "pt", format: "letter" });

  doc.setFillColor(192,192,192); doc.rect(0,0,612,80,"F");
  doc.setTextColor(30,30,30); doc.setFontSize(26); doc.setFont("helvetica","bold");
  doc.text("Airstream Tow Safety Report", 306, 38, { align:"center" });
  doc.setFontSize(11); doc.setFont("helvetica","normal");
  doc.text("Generated " + new Date().toLocaleDateString(), 306, 60, { align:"center" });

  let y = 100;
  const section = (title) => {
    doc.setFillColor(240,240,240); doc.rect(36, y-14, 540, 20, "F");
    doc.setTextColor(60,60,60); doc.setFontSize(12); doc.setFont("helvetica","bold");
    doc.text(title, 46, y); y += 18;
  };
  const row = (label, value) => {
    doc.setFont("helvetica","bold"); doc.setFontSize(10); doc.setTextColor(30,30,30);
    doc.text(label, 46, y); doc.setFont("helvetica","normal"); doc.text(String(value), 300, y); y += 16;
  };

  section("Tow Vehicle Data");
  row("Payload Rating:", data.payload + " lbs");
  row("Rear GAWR:", data.rearGawr + " lbs");
  row("GCWR:", data.gcwr + " lbs");
  row("Max Tongue Weight Rating:", data.truckTongueRating + " lbs");
  if (data.truckWeight) row("Curb Weight:", data.truckWeight + " lbs");
  y += 8;

  section("Trailer Data");
  row("Airstream Model:", data.selectedAirstream || "Custom");
  row("Trailer GVWR:", data.trailerGvwr + " lbs");
  row("Estimated Loaded Weight:", data.trailerLoaded + " lbs");
  row("Estimated Tongue Weight:", data.trailerTongue + " lbs");
  y += 8;

  section("Vehicle Load");
  row("Passengers + Driver:", data.passengers + " lbs");
  row("Cargo in Truck:", data.cargo + " lbs");
  row("Hitch / WDH Hardware:", data.hitchWeight + " lbs");
  y += 12;

  section("Safety Check Results");
  y += 4;

  if (results) {
    results.checks.forEach(c => {
      if (!c.critical) return;
      doc.setFillColor(...(c.ok ? [34,139,84] : [200,50,50]));
      doc.circle(52, y-4, 5, "F");
      doc.setTextColor(30,30,30); doc.setFont("helvetica","bold"); doc.setFontSize(10);
      doc.text(c.label, 64, y);
      doc.setFont("helvetica","normal"); doc.setFontSize(9); doc.setTextColor(80,80,80);
      const lines = doc.splitTextToSize(c.desc, 450);
      lines.forEach(line => { y += 13; doc.text(line, 64, y); });
      y += 13;
      doc.setTextColor(...(c.margin >= 0 ? [34,139,84] : [200,50,50]));
      doc.setFont("helvetica","bold");
      doc.text("Margin: " + Math.round(c.margin) + " lbs (" + Math.round(c.pct) + "% of capacity used)", 64, y);
      y += 18;
    });
    y += 8;
    const vColor = results.allOk ? (results.hasGoodMargin ? [34,139,84] : [220,130,0]) : [200,50,50];
    doc.setFillColor(...vColor); doc.roundedRect(36, y, 540, 40, 6, 6, "F");
    doc.setTextColor(255,255,255); doc.setFontSize(16); doc.setFont("helvetica","bold");
    const verdict = results.allOk ? (results.hasGoodMargin ? "SAFE TO TOW - Good Margin" : "TECHNICALLY OK - Thin Margin") : "NOT SAFE TO TOW AS CONFIGURED";
    doc.text(verdict, 306, y+26, { align:"center" });
    y += 58;
  }

  doc.setFontSize(8); doc.setTextColor(150,150,150); doc.setFont("helvetica","italic");
  doc.text("This report is for informational purposes only. Always verify specs on your door jamb sticker, owner's manual, and manufacturer towing guides.", 306, 750, { align:"center", maxWidth:500 });
  doc.save("Airstream-Tow-Safety-Report.pdf");
}

function render() {
  const s = steps[currentStep];
  const card = document.getElementById("card");
  const progressWrap = document.getElementById("progressWrap");
  const total = steps.length - 1;
  const pct = Math.round((currentStep / total) * 100);

  if (s !== "welcome" && s !== "results") {
    progressWrap.classList.remove("hidden");
    document.getElementById("stepLabel").textContent = "Step " + currentStep + " of " + (steps.length - 2);
    document.getElementById("pctLabel").textContent = pct + "%";
    document.getElementById("progressFill").style.width = pct + "%";
  } else {
    progressWrap.classList.add("hidden");
  }

  const nav = (nextLabel) => `
    <div class="nav">
      <button class="btn-secondary" onclick="goBack()">← Back</button>
      <button class="btn-primary" onclick="goNext()" ${canNext() ? "" : "disabled"}>${nextLabel}</button>
    </div>`;

  if (s === "welcome") {
    card.innerHTML = `
      <div class="welcome-center">
        <h2>Can Your Truck Tow That Airstream?</h2>
        <p>This tool walks you through every number that actually matters — payload, tongue weight, axle ratings, and GCWR — so you can answer with confidence, not guesswork.</p>
        <div class="info-box" style="text-align:left;margin-bottom:1.5rem">
          <p class="title">📋 What you'll need:</p>
          <p>• Your <strong>driver's door jamb sticker</strong> (payload + GAWR)</p>
          <p>• Your <strong>manufacturer towing guide PDF</strong> (GCWR, tongue rating)</p>
          <p>• The Airstream model you're considering</p>
        </div>
        <button class="btn-primary" onclick="goNext()">Let's Calculate →</button>
      </div>`;
  }

  else if (s === "truck_payload") {
    card.innerHTML = `
      <div class="step-icon">🚪</div>
      <h2>What is your truck's Payload Rating?</h2>
      <p class="hint">Open your driver's door and look for the sticker on the door jamb. Find: <em>"The combined weight of occupants and cargo should never exceed XXXX lbs."</em></p>
      <label>Payload (lbs)</label>
      <input type="number" placeholder="e.g. 1850" value="${data.payload}" oninput="data.payload=this.value;updateNav()" />
      <p class="warn">⚠️ Never use brochure payload — it varies by how your truck is actually equipped.</p>
      ${nav("Next →")}`;
  }

  else if (s === "truck_rear_gawr") {
    card.innerHTML = `
      <div class="step-icon">⚖️</div>
      <h2>What is your Rear GAWR?</h2>
      <p class="hint">Also on the door jamb sticker. Look for <em>"GAWR Rear: XXXX lbs"</em>. Tongue weight lands almost entirely on your rear axle — you can be under payload but still overload this.</p>
      <label>Rear GAWR (lbs)</label>
      <input type="number" placeholder="e.g. 4200" value="${data.rearGawr}" oninput="data.rearGawr=this.value;updateNav()" />
      ${nav("Next →")}`;
  }

  else if (s === "truck_gcwr") {
    card.innerHTML = `
      <div class="step-icon">📏</div>
      <h2>What is your GCWR?</h2>
      <p class="hint">Gross Combined Weight Rating = max allowed weight of truck + fully loaded trailer. Find it in your owner's manual or manufacturer towing guide PDF.</p>
      <div class="field-group">
        <div>
          <label>GCWR (lbs)</label>
          <input type="number" placeholder="e.g. 15000" value="${data.gcwr}" oninput="data.gcwr=this.value;updateNav()" />
        </div>
        <div>
          <label>Truck Curb Weight (lbs) — optional but recommended</label>
          <input type="number" placeholder="e.g. 5800" value="${data.truckWeight}" oninput="data.truckWeight=this.value" />
          <p class="hint">Enables the combined truck+trailer vs GCWR check. Found in your owner's manual.</p>
        </div>
      </div>
      ${nav("Next →")}`;
  }

  else if (s === "truck_tongue") {
    card.innerHTML = `
      <div class="step-icon">🔗</div>
      <h2>Max Tongue Weight Rating?</h2>
      <p class="hint">Often 10% of your max tow rating, but check your towing guide. It may differ between a standard hitch and a weight-distributing hitch (WDH).</p>
      <label>Tongue Weight Rating (lbs)</label>
      <input type="number" placeholder="e.g. 1100" value="${data.truckTongueRating}" oninput="data.truckTongueRating=this.value;updateNav()" />
      ${nav("Next →")}`;
  }

  else if (s === "trailer_gvwr") {
    const opts = airstreams.map(a => `<option value="${a.name}" ${data.selectedAirstream===a.name?"selected":""}>${a.name}${a.gvwr?" — GVWR: "+a.gvwr+" lbs":""}</option>`).join("");
    card.innerHTML = `
      <div class="step-icon">🏕️</div>
      <h2>Which Airstream are you considering?</h2>
      <p class="hint">Select a model or enter a custom GVWR. Never use "dry weight" — that ignores water, gear, food, and everything you actually travel with.</p>
      <div class="field-group">
        <div>
          <label>Airstream Model</label>
          <select onchange="selectAirstream(this.value)"><option value="">— Select a model —</option>${opts}</select>
        </div>
        <div>
          <label>GVWR (lbs)</label>
          <input type="number" placeholder="e.g. 5500" value="${data.trailerGvwr}" oninput="data.trailerGvwr=this.value;data.trailerLoaded=this.value;updateNav()" />
        </div>
      </div>
      ${nav("Next →")}`;
  }

  else if (s === "trailer_loaded") {
    card.innerHTML = `
      <div class="step-icon">📦</div>
      <h2>What will your trailer actually weigh?</h2>
      <p class="hint">Think realistically. For extended travel, most Airstreams end up near GVWR.</p>
      <div class="info-box">
        <p class="title">⚡ Add these to dry weight:</p>
        <p>• Full fresh water tank: +100–200 lbs</p>
        <p>• Clothes, food, tools: +100–400 lbs</p>
        <p>• Generator / solar batteries: +50–350 lbs</p>
      </div>
      <label>Estimated Loaded Trailer Weight (lbs)</label>
      <input type="number" placeholder="${data.trailerGvwr || "e.g. 5200"}" value="${data.trailerLoaded}" oninput="data.trailerLoaded=this.value;updateNav()" />
      <p class="hint">GVWR (${data.trailerGvwr} lbs) is pre-filled as a conservative estimate.</p>
      ${nav("Next →")}`;
  }

  else if (s === "trailer_tongue") {
    const loaded = n(data.trailerLoaded);
    card.innerHTML = `
      <div class="step-icon">⚡</div>
      <h2>Estimated tongue weight?</h2>
      <p class="hint">Standard formula: 12–15% of loaded trailer weight. This counts against your payload AND loads your rear axle.</p>
      <label>Tongue Weight (lbs)</label>
      <input type="number" id="tongueInput" value="${data.trailerTongue}" oninput="data.trailerTongue=this.value;updateNav()" />
      <div class="pct-btns">
        <button class="pct-btn" onclick="setPct(12)">12% = ${Math.round(loaded*0.12)} lbs</button>
        <button class="pct-btn" onclick="setPct(13)">13% = ${Math.round(loaded*0.13)} lbs</button>
        <button class="pct-btn" onclick="setPct(15)">15% = ${Math.round(loaded*0.15)} lbs</button>
      </div>
      <p class="hint">Tap a percentage above or type your own value.</p>
      ${nav("Next →")}`;
  }

  else if (s === "passengers_cargo") {
    card.innerHTML = `
      <div class="step-icon">👥</div>
      <h2>Who and what is in the truck?</h2>
      <p class="hint">These eat directly into your payload alongside tongue weight. Use 175–200 lbs per person as a realistic estimate.</p>
      <div class="field-group">
        <div>
          <label>Total Passenger Weight — driver + all occupants (lbs)</label>
          <input type="number" placeholder="e.g. 380" value="${data.passengers}" oninput="data.passengers=this.value" />
        </div>
        <div>
          <label>Cargo in Truck Bed / Cab (lbs)</label>
          <input type="number" placeholder="e.g. 150" value="${data.cargo}" oninput="data.cargo=this.value" />
        </div>
      </div>
      ${nav("Next →")}`;
  }

  else if (s === "hitch_weight") {
    card.innerHTML = `
      <div class="step-icon">🔩</div>
      <h2>Hitch hardware weight?</h2>
      <p class="hint">The receiver, ball mount, and WD bars all count against payload. Enter 0 if unknown.</p>
      <label>Hitch / WDH Hardware Weight (lbs)</label>
      <input type="number" placeholder="e.g. 90" value="${data.hitchWeight}" oninput="data.hitchWeight=this.value" />
      <p class="hint">Typical hitch: 30–60 lbs. Weight distribution kit: 70–120 lbs.</p>
      ${nav("Calculate →")}`;
  }

  else if (s === "results" && results) {
    const verdictColor = results.allOk ? (results.hasGoodMargin ? "#22c55e" : "#f59e0b") : "#ef4444";
    const verdictBg = results.allOk ? (results.hasGoodMargin ? "rgba(34,139,84,0.2)" : "rgba(220,130,0,0.2)") : "rgba(200,50,50,0.2)";
    const verdictEmoji = results.allOk ? (results.hasGoodMargin ? "✅" : "⚠️") : "❌";
    const verdictText = results.allOk ? (results.hasGoodMargin ? "Safe to Tow — Good Margin" : "Technically OK — Thin Margin") : "Not Safe As Configured";

    const checksHtml = results.checks.map(c => {
      const barColor = c.pct < 85 ? "#22c55e" : c.pct < 100 ? "#f59e0b" : "#ef4444";
      const marginColor = c.margin >= 0 ? "#22c55e" : "#ef4444";
      const borderColor = (c.ok || !c.critical) ? "rgba(255,255,255,0.1)" : "#ef4444";
      return `
        <div class="check-item" style="border:1px solid ${borderColor}">
          <div class="check-header">
            <span>${c.ok || !c.critical ? "✅" : "❌"}</span>
            <span class="check-label">${c.label}</span>
            ${!c.critical ? '<span class="check-skip">(skipped — no data)</span>' : ""}
          </div>
          <p class="check-desc">${c.desc}</p>
          ${c.critical ? `
            <div class="bar-wrap"><div class="bar-fill" style="width:${Math.min(c.pct,100)}%;background:${barColor}"></div></div>
            <p class="bar-label" style="color:${marginColor}">${Math.round(c.pct)}% used — margin: ${Math.round(c.margin)} lbs</p>
          ` : ""}
        </div>`;
    }).join("");

    const travelNote = (results.allOk && !results.hasGoodMargin) ? `
      <div class="travel-note">
        <strong>Extended travel note:</strong> For Alaska-level or remote trips, aim for 10–15% payload margin and 10% GCWR margin. Consider a lighter load or a different configuration.
      </div>` : "";

    card.innerHTML = `
      <div class="verdict-box">
        <div class="verdict-inner" style="background:${verdictBg};border:2px solid ${verdictColor}">
          <div class="verdict-emoji">${verdictEmoji}</div>
          <div class="verdict-text" style="color:${verdictColor}">${verdictText}</div>
        </div>
      </div>
      <div class="checks">${checksHtml}</div>
      ${travelNote}
      <div class="result-actions">
        <button class="btn-primary" onclick="generatePDF()">📄 Download PDF Report</button>
        <button class="btn-secondary" onclick="resetAll()">↩ Start Over</button>
      </div>
      <p style="color:#6b7280;font-size:0.75rem;margin-top:1rem">
        Download the PDF to save your results. Share it with your dealer, a mechanic, or keep it in your glove box.
      </p>`;
  }
}

function updateNav() {
  // Re-enable/disable the Next button based on current input
  const nextBtn = document.querySelector('.btn-primary');
  if (nextBtn && steps[currentStep] !== 'welcome') {
    nextBtn.disabled = !canNext();
  }
}

render();
</script>
</body>
</html>
